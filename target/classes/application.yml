spring:
  application:
    name: bar-inventory-system
  r2dbc:
    url: ${DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/bar_inventory}
    username: ${DB_USERNAME:bar_user}
    password: ${DB_PASSWORD:bar_pass}
  flyway:
    enabled: true
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/bar_inventory}
    user: ${DB_USERNAME:bar_user}
    password: ${DB_PASSWORD:bar_pass}
  main:
    web-application-type: reactive
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-please-very-long-secret}
  expiration-minutes: 120
