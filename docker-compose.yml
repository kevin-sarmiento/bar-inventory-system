version: "3.9"

services:
  db:
    image: postgres:15
    container_name: bar_inventory_db
    environment:
      POSTGRES_DB: bar_inventory
      POSTGRES_USER: bar_user
      POSTGRES_PASSWORD: bar_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: bar_inventory_app
    environment:
      DB_R2DBC_URL: r2dbc:postgresql://db:5432/bar_inventory
      DB_JDBC_URL: jdbc:postgresql://db:5432/bar_inventory
      DB_USERNAME: bar_user
      DB_PASSWORD: bar_pass
      JWT_SECRET: super-secret-change-me-please-12345678901234567890
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data:
